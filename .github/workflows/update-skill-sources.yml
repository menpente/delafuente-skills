name: Refresh Skill Source Data

on:
  schedule:
    # Every Monday at 08:00 UTC
    - cron: "0 8 * * 1"

  # Also run on push to the fetcher or overrides
  push:
    paths:
      - "fetch_sources.py"

  # Manual trigger from GitHub Actions UI
  workflow_dispatch:

jobs:
  fetch:
    name: Fetch live source metadata
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit sources-live.json back

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run fetcher
        env:
          # Add GITHUB_TOKEN as a repo secret for authenticated API access (5000 req/hr)
          # Without it, anonymous limit is 60 req/hr — fine for weekly runs
          GITHUB_TOKEN: ${{ secrets.SKILL_GITHUB_TOKEN }}
        run: |
          python fetch_sources.py --out docs/sources-live.json

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/sources-live.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: refresh skill source data [$(date -u +%Y-%m-%d)]"
            git push
          fi

      - name: Summary
        run: |
          echo "### Skill Source Refresh" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          python - <<'EOF'
          import json, sys
          try:
              data = json.load(open("docs/sources-live.json"))
              meta = data["_meta"]
              print(f"| Field | Value |")
              print(f"|-------|-------|")
              print(f"| Generated at | {meta['generatedAt']} |")
              print(f"| Sources | {meta['sourceCount']} |")
              print(f"| Unreachable | {len(meta['unreachable'])} |")
              print(f"| Stale repos | {len(meta['staleRepos'])} |")
              if meta['unreachable']:
                  print(f"\n⚠️ **Unreachable:** {', '.join(meta['unreachable'])}")
              if meta['staleRepos']:
                  print(f"\n⏰ **Stale (>6 months):** {', '.join(meta['staleRepos'])}")
          except Exception as e:
              print(f"Could not read output: {e}", file=sys.stderr)
          EOF
          >> $GITHUB_STEP_SUMMARY
